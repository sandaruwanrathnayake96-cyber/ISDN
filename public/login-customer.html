<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - IslandLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-bolt"></i> Dashboard
        </div>
        <nav class="nav-links">
            <a href="login.html" class="nav-link">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="#" class="nav-link">
                <i class="fa-solid fa-book-open"></i> Catalogue
            </a>
            <div
                style="margin-top: 1rem; margin-bottom: 0.5rem; font-size: 0.8rem; color: #6c757d; padding-left: 1rem;">
                ENTRANCE</div>
            <a href="login-customer.html" class="nav-link active">
                <i class="fa-solid fa-user"></i> Customer Login
            </a>
            <a href="login-driver.html" class="nav-link">
                <i class="fa-solid fa-truck"></i> Driver Login
            </a>
            <a href="login-rdc.html" class="nav-link">
                <i class="fa-solid fa-warehouse"></i> RDC Login
            </a>
            <a href="login-manager.html" class="nav-link">
                <i class="fa-solid fa-chart-line"></i> Manager Login
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-wrapper">
        <header class="top-header">
            <div class="header-title">
                <i class="fa-solid fa-umbrella-beach"></i> <span>IslandLink</span>
            </div>
        </header>

        <div class="content-container" style="background-color: #f0f2f5;">
            <div class="login-card-container">
                <div class="login-title">Customer Login</div>

                <div class="role-badge">
                    <i class="fa-solid fa-cart-shopping" style="color: #0d6efd;"></i> Customer
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <input type="text" id="username" class="form-control" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="form-options">
                        <label style="margin-bottom: 0;">
                            <input type="checkbox"> Remember Me
                        </label>
                        <a href="#" style="color: var(--primary-color); font-size: 0.85rem;">Forgot Password?</a>
                    </div>

                    <div id="error-message" class="text-danger mb-4 text-center" style="font-size: 0.9rem;"></div>
                    <button type="submit" class="login-btn">Login</button>

                    <div style="margin-top: 1rem; font-size: 0.8rem; color: #888;">
                        Demo: customer1 / password123
                    </div>
                </form>

                <div class="signup-link">
                    Don't have an account? <a href="register.html">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
