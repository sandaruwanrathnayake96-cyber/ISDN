<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - IslandLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-bolt"></i> Dashboard
        </div>
        <nav class="nav-links">
            <a href="#" onclick="showSection('shop')" class="nav-link active" id="nav-shop">
                <i class="fa-solid fa-store"></i> Shop
            </a>
            <a href="#" onclick="showSection('orders')" class="nav-link" id="nav-orders">
                <i class="fa-solid fa-box-open"></i> My Orders
            </a>
            <a href="#" onclick="showSection('profile')" class="nav-link" id="nav-profile">
                <i class="fa-solid fa-user"></i> Profile
            </a>
            <div style="margin-top: auto;"> <!-- Push logout to bottom -->
                <a href="#" onclick="logout()" class="nav-link" style="color: #dc3545;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-wrapper">
        <header class="top-header">
            <div class="header-title">
                <i class="fa-solid fa-umbrella-beach"></i> <span>IslandLink</span>
            </div>
            <div>
                <span style="font-size: 0.9rem; margin-right: 1rem;">Welcome, <span id="username-display"
                        style="font-weight: 600;">User</span></span>
                <button onclick="logout()"
                    style="width: auto; padding: 0.4rem 1rem; font-size: 0.8rem; background: rgba(255,255,255,0.2);">Logout</button>
            </div>
        </header>

        <div class="content-container">
            <div style="display: grid; grid-template-columns: 1fr 300px; gap: 2rem;">

                <!-- Left: Content Area -->
                <div id="main-content-area">
                    <!-- Shop View (Default) -->
                    <div id="shop-view">
                        <h2 class="mb-4"><i class="fa-solid fa-tags"></i> Product Catalogue</h2>
                        <div id="products-container" class="card-grid">
                            <!-- Products injected here -->
                        </div>
                    </div>

                    <!-- Orders View (Hidden) -->
                    <div id="orders-view" style="display: none;">
                        <h2 class="mb-4"><i class="fa-solid fa-clock-rotate-left"></i> Order History</h2>
                        <div class="card"
                            style="padding: 0; overflow: hidden; background: white; border-radius: var(--border-radius); box-shadow: var(--shadow);">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Date</th>
                                        <th>Total</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="orders-table-body">
                                    <!-- Orders injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Profile View (Hidden) -->
                    <div id="profile-view" style="display: none;">
                        <h2 class="mb-4"><i class="fa-solid fa-user"></i> My Profile</h2>
                        <div class="card"
                            style="background: white; padding: 2rem; border-radius: 8px; box-shadow: var(--shadow);">
                            <div style="display: flex; align-items: flex-start; gap: 2rem;">
                                <div style="text-align: center;">
                                    <div
                                        style="width: 100px; height: 100px; background: #e9ecef; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #adb5bd; margin-bottom: 1rem;">
                                        <i class="fa-solid fa-user"></i>
                                    </div>
                                    <button class="btn-sm" style="font-size: 0.8rem; padding: 0.3rem 0.6rem;">Change
                                        Photo</button>
                                </div>
                                <div style="flex-grow: 1;">
                                    <div class="form-group">
                                        <label>Full Name</label>
                                        <input type="text" id="profile-name" class="form-control" value="User Name"
                                            readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>Email Address</label>
                                        <input type="email" id="profile-email" class="form-control"
                                            value="user@example.com" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>Role</label>
                                        <input type="text" class="form-control" value="Customer" disabled>
                                    </div>
                                    <div style="margin-top: 1.5rem;">
                                        <button onclick="alert('Profile update feature coming soon!')"
                                            style="background-color: var(--primary-color); color: white; padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer;">Update
                                            Profile</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Cart Sidebar -->
                <div>
                    <div class="role-card"
                        style="position: sticky; top: 2rem; align-items: stretch; text-align: left; background: white;">
                        <div class="role-title"
                            style="border-bottom: 1px solid #eee; padding-bottom: 0.5rem; margin-bottom: 1rem;">
                            <i class="fa-solid fa-cart-shopping"></i> Shopping Cart
                        </div>
                        <div id="cart-items" class="cart-items" style="max-height: 300px; overflow-y: auto;">
                            <p class="text-secondary text-center">Your cart is empty.</p>
                        </div>
                        <div id="cart-total"
                            style="font-size: 1.25rem; font-weight: 700; text-align: right; margin: 1rem 0;">Total:
                            Rs. 0.00</div>
                        <button onclick="openPaymentModal()"><i class="fa-solid fa-check"></i> Checkout</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="payment-modal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-btn" onclick="closePaymentModal()">&times;</span>
            <h2 class="mb-4">Secure Payment</h2>

            <div class="form-group">
                <label>Delivery Address</label>
                <input type="text" id="delivery-address" class="form-control" placeholder="No. 123, Street Name, City"
                    required>
            </div>

            <div class="form-group">
                <label>Contact Number</label>
                <input type="tel" id="contact-number" class="form-control" placeholder="077-1234567" required>
            </div>

            <div class="form-group">
                <label>Payment Method</label>
                <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="payment-method" value="Card" checked onchange="togglePaymentFields()">
                        <i class="fa-solid fa-credit-card"></i> Card Payment
                    </label>
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="payment-method" value="Cash" onchange="togglePaymentFields()">
                        <i class="fa-solid fa-money-bill-wave"></i> Cash on Delivery
                    </label>
                </div>
            </div>

            <div id="card-details">
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19"
                        id="card-number">
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Expiry Date</label>
                        <input type="text" class="form-control" placeholder="MM/YY" maxlength="5" id="card-expiry">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="password" class="form-control" placeholder="123" maxlength="3" id="card-cvv">
                    </div>
                </div>
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" class="form-control" placeholder="Name on Card" id="card-name">
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;">
                <div style="font-weight: 700; font-size: 1.2rem;">Total: <span id="payment-total">Rs. 0.00</span></div>
                <button onclick="confirmPayment()" class="login-btn" style="width: auto; padding: 0.8rem 2rem;">Pay &
                    Order</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/customer.js"></script>
</body>

</html>
